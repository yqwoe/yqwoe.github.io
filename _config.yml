markdown_it_plus:
  render:
    html: true
    xhtmlOut: false
    breaks: true
    linkify: true
    typographer: true
    quotes: '“”‘’'
  plugins:
    - plugin:
        name: markdown-it-deflist
        enable: true
    - plugin:
        name: markdown-it-abbr
        enable: true
    - plugin:
        name: markdown-it-emoji
        enable: true
    - plugin:
        name: markdown-it-footnote
        enable: true
    - plugin:
        name: markdown-it-ins
        enable: true
    - plugin:
        name: markdown-it-mark
        enable: true
    - plugin:
        name: markdown-it-sub
        enable: true
    - plugin:
        name: markdown-it-sup
        enable: true
    - plugin:
        name: markdown-it-checkbox
        enable: true
    - plugin:
        name: markdown-it-imsize
        enable: true
    - plugin:
        name: markdown-it-container
        enable: true
        options: tips
    - plugin:
        name: markdown-it-container
        enable: true
        options: success
    - plugin:
        name: markdown-it-container
        enable: true
        options: danger
    - plugin:
        name: markdown-it-container
        enable: true
        options: warning
    - plugin:
        name: markdown-it-container
        enable: true
        options: spoiler
    - plugin:
        name: markdown-it-expandable
        enable: true
  anchors:
    level: 2
    collisionSuffix: 'v'
    permalink: true
    permalinkClass: header-anchor
    permalinkSide: 'left'
    permalinkSymbol: ¶
pjax: true
encrypt:
  enable: true
  abstract: 文章加密了，需要输入密码查看
  message: 输入密码查看内容
  theme: wave
  tags:
  - {name: tagName, password: 密码A}
  - {name: tagName, password: 密码B}
  template: <div id="hexo-blog-encrypt" data-wpm="{{hbeWrongPassMessage}}" data-whm="{{hbeWrongHashMessage}}"><div class="hbe-input-container"><input type="password" id="hbePass" placeholder="{{hbeMessage}}" /><label>{{hbeMessage}}</label><div class="bottom-line"></div></div><script id="hbeData" type="hbeData" data-hmacdigest="{{hbeHmacDigest}}">{{hbeEncryptedData}}</script></div>
  wrong_pass_message: 糟糕！密码错误了.
  wrong_hash_message: 抱歉, 这个文章不能被校验, 不过您还是能看看解密后的内容.


reveal:
  plugins:
    - RevealHighlight
    - RevealMarkdown
    - RevealSearch
    - RevealNotes
    - RevealZoom
    - RevealMath
    - RevealMath.KaTeX
    - RevealMermaid
    - RevealChalkboard
    - RevealCustomControls
    # - RevealAnimate
  css_urls:
    -  /reveal.js-plugins/customcontrols/style.css
    -  /reveal.js-plugins/chalkboard/style.css
  config:
    hash: true
    help: false
    transition: linear
    overview: false
    history: true
    autoAnimateEasing: ease-out
    autoSlide: 5000
    loop: true
    chalkboard:
      boardmarkerWidth: 3
      chalkWidth: 7
      chalkEffect: 1
      storage: null
      src: null
      transition: 800
      theme: chalkboard
      background:
        - 'rgba(127,127,127,.1)'
        - /reveal.js-plugins/chalkboard/img/blackboard.png
      grid:
        color: 'rgb(50,50,10,0.5)'
        distance: 80
        width: 2
      eraser:
        src: /reveal.js-plugins/chalkboard/img/sponge.png
        radius: 20
      boardmarkers:
        - color: 'rgba(100,100,100,1)'
          cursor: 'url(/reveal.js-plugins/chalkboard/img/boardmarker-black.png), auto'
          opacity: 0
        - color: 'rgba(30,144,255, 1)'
          cursor: 'url(/reveal.js-plugins/chalkboard/img/boardmarker-blue.png), auto'
        - color: 'rgba(220,20,60,1)'
          cursor: 'url(1img/boardmarker-red.png), auto'
        - color: 'rgba(50,205,50,1)'
          cursor: 'url(/reveal.js-plugins/chalkboard/img/boardmarker-green.png), auto'
        - color: 'rgba(255,140,0,1)'
          cursor: 'url(/reveal.js-plugins/chalkboard/img/boardmarker-orange.png), auto'
        - color: 'rgba(150,0,20150,1)'
          cursor: 'url(/reveal.js-plugins/chalkboard/img/boardmarker-purple.png), auto'
        - color: 'rgba(255,220,0,1)'
          cursor: 'url(/reveal.js-plugins/chalkboard/img/boardmarker-yellow.png), auto'
      chalks:
        - color: 'rgba(255,255,255,0.5)'
          cursor: 'url(/reveal.js-plugins/chalkboard/img/chalk-white.png), auto'
        - color: 'rgba(96, 154, 244, 0.5)'
          cursor: 'url(/reveal.js-plugins/chalkboard/img/chalk-blue.png), auto'
        - color: 'rgba(237, 20, 28, 0.5)'
          cursor: 'url(/reveal.js-plugins/chalkboard/img/chalk-red.png), auto'
        - color: 'rgba(20, 237, 28, 0.5)'
          cursor: 'url(/reveal.js-plugins/chalkboard/img/chalk-green.png), auto'
        - color: 'rgba(220, 133, 41, 0.5)'
          cursor: 'url(/reveal.js-plugins/chalkboard/img/chalk-orange.png), auto'
        - color: 'rgba(220,0,220,0.5)'
          cursor: 'url(/reveal.js-plugins/chalkboard/img/chalk-purple.png), auto'
        - color: 'rgba(255,220,0,0.5)'
          cursor: 'url(/reveal.js-plugins/chalkboard/img/chalk-yellow.png), auto'
    # customcontrols:
    #   controls:
    #     - icon: <i class="fa fa-pen-square"></i>
    #       title: "Pdf Export"
    #       action: "window.location.href = window.location.href+'?print-pdf'"
    showNotes: true
    dependencies:
      - src: '/revealjs-animated/dist/revealjs-animated.js'
        async: true
