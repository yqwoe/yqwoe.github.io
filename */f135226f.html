<script type="text/javascript">

      f('--link-hover-color', '#96b1bb');
      f('--link-bg-color', '#5d828e');
      f('--selection-color', '#acc1c9');
    },
    o = d.getElementById("sans-font"),
    e = () => {
      f('--body-stack', '"Lora", "Georgia", "Times New Roman", serif');
      // o.innerHTML = "无衬"
    },
    g = () => {
      f('--body-stack', '"Lato", "Lucida Grande", "Lucida Sans Unicode", "Lucida Sans", "Verdana", sans-serif');
      // o.innerHTML = "衬线"
    };
  m.onclick = function(){
    if (s == 2) {
      s = 1;
      l.setItem('s', s);
      c()
    } else {
      s = 2;
      l.setItem('s', s);
      b()
    }
  };
  o.onclick =function(){
    if (n == 2) {
      n = 1;
      l.setItem('n', n);
      g()
    } else {
      n = 2;
      l.setItem('n', n);
      e()
    }
  };
  if (s || s == '1') {
      s = 1;
      l.setItem('s', s);
    c()
  }

  if (!s || s == '2') {
      s = 2;
      l.setItem('s', s);
    b()
  };
  if (!n) {
    n = 2;

  };

  };
  if (n == '2') {

  };
</script>

window.requestAnimationFrame = (function () {
  return window.requestAnimationFrame ||
    window.webkitRequestAnimationFrame ||/* Safari 和 Chrome */
    window.mozRequestAnimationFrame ||/* Firefox */
    window.oRequestAnimationFrame      ||/* Opera */
    window.msRequestAnimationFrame     ||/* IE 9 */
    function (callback) {

    }
})();
window.cancelAnimationFrame = (function () {

    window.mozCancelAnimationFrame ||

function get_poem(poem_ele, info_ele) {
    var poem = document.querySelector(poem_ele);
    var info = document.querySelector(info_ele);
    var xhr = new XMLHttpRequest();
    xhr.open('get', 'https://v2.jinrishici.com/one.json?client=browser-sdk/1.2');
    xhr.withCredentials = true;
    xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
            var data = JSON.parse(xhr.responseText);
            poem.innerHTML = data.data.content;
            info.innerHTML = '[' + data.data.origin.dynasty + '] ' + data.data.origin.author + '《' + data.data.origin.title + '》';
        }
    };
    xhr.send();
}

/**
 * 设置精度定时器
 * @param {function} 回调函数
 * @param {number}   延迟时间
 * @return {number}  定时器ID
 */
 function setIntervalPrecision(callback, delay) {
  // 生成并记录定时器ID
  let obj = window.interValPrecisionObj || (window.interValPrecisionObj = { num: 0 })
  obj.num++
  obj['n' + obj.num] = true
  var intervalId = obj.num
  // 开始时间
  var startTime = +new Date()
  // 已执行次数
  var count = 0
  // 延迟时间
  delay = delay || 0


  ;(function loop() {
    // 定时器被清除，则终止
    if (!obj['n' + intervalId]) return

    // 满足条件执行回调
    if (+new Date() > startTime + delay * (count + 1)) {
      count++
      callback(count)
    }

    window.requestAnimationFrame(loop)
  })()

  return intervalId
}

/**
 * 清除精度定时器
 * @param {number} 定时器ID
 */
function clearIntervalPrecision(intervalId) {
  if (window.interValPrecisionObj) {
    window.cancelAnimationFrame('n' + intervalId)
    delete window.interValPrecisionObj['n' + intervalId]
  }
}
